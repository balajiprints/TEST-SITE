<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balaji Print</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
.card:hover{
transform:translateY(-5px);
transition:.3s;
}
</style>
</head>

<body class="bg-gray-100">

<header class="sticky top-0 bg-white shadow z-50">
<div class="max-w-7xl mx-auto p-4 flex justify-between items-center">
<div class="flex items-center gap-3">
<div class="w-14 h-14 rounded-full bg-orange-500"></div>
<div>
<h1 class="text-2xl font-bold">Balaji Print</h1>
<p class="text-sm text-gray-500">Premium Print & Personalized Design</p>
</div>
</div>

<div class="text-right">
<p>📞 9414350535</p>
<p>📍 Churu, Rajasthan</p>
</div>
</div>
</header>

<section class="max-w-7xl mx-auto p-5">
<h2 class="text-3xl font-bold mb-5">Categories</h2>

<div id="categories"
class="grid md:grid-cols-4 gap-5"></div>
</section>

<section class="max-w-7xl mx-auto p-5">
<h2 class="text-3xl font-bold mb-5">Products</h2>
<div id="products"
class="grid md:grid-cols-3 gap-5"></div>
</section>

<div id="formModal"
class="hidden fixed inset-0 bg-black/60 z-50 overflow-auto">

<div class="bg-white max-w-xl mx-auto mt-10 p-6 rounded">

<h2 class="text-2xl font-bold mb-4">
Customization Form
</h2>

<form id="orderForm">

<input id="productName" type="hidden">

<label class="block mb-2">Upload Photo</label>
<input type="file" required class="w-full border p-2 mb-3">

<input id="name"
placeholder="Name"
class="w-full border p-2 mb-3"
required>

<input id="mobile"
placeholder="Mobile"
class="w-full border p-2 mb-3"
required>

<textarea id="address"
placeholder="Address"
class="w-full border p-2 mb-3"
required></textarea>

<textarea id="remark"
placeholder="Remark"
class="w-full border p-2 mb-3"></textarea>

<button
class="bg-green-600 text-white px-5 py-2 rounded w-full">
Pay Now
</button>

</form>

</div>
</div>

<footer class="bg-black text-white mt-10 p-5 text-center">
<h3 class="text-xl font-bold">Balaji Print</h3>
<p>Premium Print & Personalized Design</p>
<p>📞 9414350535</p>
<p>📍 Churu, Rajasthan</p>
<p>UPI: 9414350535@okbizaxis</p>
</footer>

<script src="config.js"></script>
<script src="script.js"></script>

</body>
</html>
